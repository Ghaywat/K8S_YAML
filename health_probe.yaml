apiVersion: apps/v1
kind: Deployment
metadata:
  name: probe-demo-deploy
  namespace: ckad-ns
spec:
  replicas: 2
  selector:
    matchLabels:
      app: probe-demo
  template:
    metadata:
      labels:
        app: probe-demo
    spec:
      containers:
      - name: web
        image: nginx
        ports:
        - containerPort: 80
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 15
      - name: worker
        image: busybox
        command: ["sh", "-c", "touch /tmp/ready; sleep 3600"]
        readinessProbe:
          exec:
            command:
            - cat
            - /tmp/ready
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          exec:
            command:
            - sh
            - -c
            - test -f /tmp/ready
          initialDelaySeconds: 10
          periodSeconds: 15